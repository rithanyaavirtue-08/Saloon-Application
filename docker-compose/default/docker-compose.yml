services:

 userdb:
    image: mysql
    container_name: userdb
    ports:
      - 3301:3306
    healthcheck:
      test: [ "CMD", "mysqladminn", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
     MYSQL_ROOT_PASSWORD: root123
     MYSQL_DATABASE: userdb
    networks:
      - zen

