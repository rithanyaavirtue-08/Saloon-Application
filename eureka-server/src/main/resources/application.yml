server:
  port: 8070

spring:
  application:
    name: eureka-server

eureka:
  client:
    defaultZone: http://localhost:8070/eureka/
    register-with-eureka: false
    fetch-registry: false


management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true